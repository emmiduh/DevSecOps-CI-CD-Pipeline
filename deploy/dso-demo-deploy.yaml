apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: dso-demo
  name: nexusfintechapp
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dso-demo
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'dso-demo'
        vault.hashicorp.com/agent-inject-secret-database: 'secret/data/dso-demo/database'
        vault.hashicorp.com/agent-inject-status: 'update'
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "secret/data/dso-demo/database" -}}
            mysql -u {{ .Data.data.username }} -p {{ .Data.data.password }} -h database:3306 mydb
          {{- end -}}
      labels:
        app: dso-demo
    spec:
      serviceAccountName: nexusfintechapp
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
      - image: emmiduh93/nexus-fintech:42
        name: dso-demo
        volumeMounts:
          - name: tmp
            mountPath: /tmp
        ports:
        - containerPort: 8080
        securityContext:
          capabilities:
            drop:
              - ALL
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          runAsUser: 1000
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
status: {}

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexusfintechapp-monitor
  namespace: dev
  labels:
    release: prom-stack # Must match the Helm release name
spec:
  selector:
    matchLabels:
      app: dso-demo
  endpoints:
  - port: http-metrics
    path: /actuator/prometheus
    interval: 15s
