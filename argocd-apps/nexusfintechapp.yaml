apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexusfintechapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/emmiduh/DevSecOps-CI-CD-Pipeline.git'
    path: apps/nexusfintechapp
    targetRevision: main
    plugin:
      name: argocd-vault-plugin-helm
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
